# PRO Library — SUSHI configuration
#
# WORKING NAMESPACE for the 0.x line: https://fhir.bih-charite.de/pro-library
# This is provisional. The 1.0.0 release may migrate the namespace if the
# normative authority moves to MII / a TMF-trustee consortium / a federal
# body. See ARTIFACT_METADATA_POLICY.md §2 for the migration plan.

id: bih-cei.fhir.pro-library
canonical: https://fhir.bih-charite.de/pro-library
url: https://fhir.bih-charite.de/pro-library/ImplementationGuide/bih-cei.fhir.pro-library
name: PROLibrary
title: PRO Library
description: |
  A curated reference source of FHIR-encoded Patient-Reported Outcome Measure
  (PROM) Questionnaires. First-version artefacts are derivedFrom MII PRO
  with versioned upstream canonicals; subsequent editorial work attaches
  Provenance, scoring libraries, conformance test suites, and CRMI tier
  profile claims.

  See VISION.md (companion form-manager repo) for the strategic context,
  including the explicit authority-gap statement (§1a) — this work builds
  the technical infrastructure a future normative authority would need.

version: 0.1.0
status: draft   # 0.x = pre-stable, expect breaking changes
fhirVersion: 4.0.1
copyrightYear: 2026+
releaseLabel: ci-build

publisher:
  name: BIH-CEI (provisional steward)
  url: https://www.bihealth.org/
  email: t.mittag88@gmail.com

contact:
